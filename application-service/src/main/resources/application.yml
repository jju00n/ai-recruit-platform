server:
  port: 8084

spring:
  application:
    name: application-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/ai_recruit?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: application-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.example.airecruit.application.kafka"
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads/resumes}

claude:
  api:
    key: ${CLAUDE_API_KEY:}
    model: claude-sonnet-4-6        # 지원 분석 (Kafka 비동기, 정확도 우선)
    fast-model: claude-haiku-4-5-20251001  # 코칭/추천 (사용자 대기, 속도 우선)
    url: https://api.anthropic.com/v1/messages

job-service:
  url: http://localhost:8083